name: layer2-gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, labeled, unlabeled, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: layer2-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Layer 2 review state
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          set -euo pipefail
          # Use raw REST instead of `gh pr view --json labels`. The latter
          # issues a GraphQL query touching author/team fields that need
          # read:org scope, which GITHUB_TOKEN lacks. REST works.
          labels="$(gh api "repos/$REPO/issues/$PR_NUMBER" --jq '.labels[].name')"

          has_label() {
            printf "%s\n" "$labels" | grep -Fxq "$1"
          }

          # Break-glass: agent-review:emergency-bypass passes the gate
          # regardless of review state. Used when the local Layer 2 runner
          # is down and a hotfix must merge. Auditable via the labels
          # history (the label is timestamped to the actor who applied it).
          if has_label "agent-review:emergency-bypass"; then
            echo "::warning::Layer 2 gate bypassed via agent-review:emergency-bypass label. Auditable in labels history. Verify this is intentional."
            exit 0
          fi

          if [ "$IS_DRAFT" = "true" ] && ! has_label "agent-review:approved"; then
            echo "Draft PR is waiting for readiness or explicit Layer 2 approval."
            exit 1
          fi

          if has_label "agent-review:changes-requested"; then
            echo "Layer 2 requested changes."
            exit 1
          fi

          if has_label "agent-review:needs-human"; then
            echo "Layer 2 requires human review."
            exit 1
          fi

          if has_label "agent-review:approved"; then
            echo "Layer 2 approved this PR."
            exit 0
          fi

          if has_label "risk:low" && has_label "agent-review:router-only"; then
            echo "Low-risk router-only PR passes Layer 2 gate."
            exit 0
          fi

          echo "Waiting for Layer 2 approval. Add agent-review:approved after review, mark low-risk router-only, or apply agent-review:emergency-bypass for a hotfix when the runner is unavailable."
          exit 1
